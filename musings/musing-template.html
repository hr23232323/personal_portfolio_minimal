<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="{{DESCRIPTION}}">
    <title>{{TITLE}} - Harsh Rana</title>
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="musing-styles.css">
</head>
<body>
    <main class="musing-container">
        <article class="musing">
            <a href="/" class="back-link">← Back</a>

            <div class="musing-meta">
                <time>{{DATE}}</time>
            </div>

            <h1 class="musing-title">{{TITLE}}</h1>

            <div class="musing-content">
                {{CONTENT}}
            </div>
        </article>
    </main>

    <footer class="musing-footer">
        <section class="subscribe-section">
            <h3>Stay in the loop</h3>
            <p>If you enjoyed this, you'll probably like my newsletter. I send out thoughts on AI and engineering every few weeks.</p>
            <iframe
                scrolling="no"
                style="width:100%; height:150px; border:none; margin-top:1.5rem; filter: invert(0.9) hue-rotate(180deg);"
                src="https://buttondown.com/harshrana?as_embed=true"
            ></iframe>
        </section>
    </footer>
</body>
</html>
