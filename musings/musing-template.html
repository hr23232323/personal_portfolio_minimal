<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="{{DESCRIPTION}}">
    <title>{{TITLE}} - Harsh Rana</title>
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="musing-styles.css">
</head>
<body>
    <main class="musing-container">
        <article class="musing">
            <a href="/" class="back-link">← Back</a>

            <div class="musing-meta">
                <time>{{DATE}}</time>
            </div>

            <h1 class="musing-title">{{TITLE}}</h1>

            <div class="musing-content">
                {{CONTENT}}
            </div>
        </article>
    </main>

    <footer class="musing-footer">
        <section class="subscribe-section">
            <h3>Stay in the loop</h3>
            <p>If you enjoyed this, you'll probably like my newsletter. I send out thoughts on AI and engineering every few weeks.</p>
            <form
                action="https://buttondown.email/api/emails/embed-subscribe/harshrana"
                method="post"
                target="popupwindow"
                onsubmit="window.open('https://buttondown.email/harshrana', 'popupwindow')"
                class="subscribe-form"
            >
                <input type="email" name="email" id="bd-email" placeholder="email@example.com" required>
                <button type="submit">Subscribe</button>
            </form>
        </section>
        <p class="footer-contact">Questions or thoughts? <a href="mailto:hr23232323@gmail.com">Get in touch</a></p>
    </footer>
</body>
</html>
